# Run app + database together

services:
  # PostgreSQL with pgvector extension
  db:
    image: ankane/pgvector:latest
    container_name: research_db
    environment:
      POSTGRES_DB: research
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d research"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI application - uses pre-built image from ECR
  app:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest
    container_name: research_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/research
      MOCK_MODE: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
