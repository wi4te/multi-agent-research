name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: multi-agent-research

jobs:
  # ============================================
  # JOB 1: Test the code
  # ============================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run flake8 (linting)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run pytest
        env:
          MOCK_MODE: "true"
        run: |
          pytest tests/ -v

  # ============================================
  # JOB 2: Build and push Docker image to ECR
  # ============================================
  build:
    name: Build & Push to ECR
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          echo "image_tag=${ECR_REGISTRY}/multi-agent-research:${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "IMAGE_URI=${ECR_REGISTRY}/multi-agent-research" >> $GITHUB_OUTPUT

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          docker build \
            -t ${{ steps.meta.outputs.image_tag }} \
            -t ${ECR_REGISTRY}/multi-agent-research:latest \
            .

      - name: Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          docker push ${{ steps.meta.outputs.image_tag }}
          docker push ${ECR_REGISTRY}/multi-agent-research:latest

  # ============================================
  # JOB 3: Deploy to EC2
  # ============================================
  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          # Decode base64 key and write to file
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Remove any Windows line endings
          sed -i 's/\r$//' ~/.ssh/deploy_key
          # Verify key
          echo "Key file size: $(wc -c < ~/.ssh/deploy_key) bytes"
          head -1 ~/.ssh/deploy_key | cut -c1-30
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1 && echo "Key is valid" || echo "Key is INVALID"

      - name: Deploy via SSH
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/deploy_key \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << DEPLOY
            set -e
            echo "===== Deploy started at \$(date) ====="
            pwd
            whoami
            docker --version

            cd ~/multi_agent_research
            ls -la

            # Install AWS CLI if not present
            if ! command -v aws &> /dev/null; then
              echo "Installing AWS CLI..."
              sudo apt-get update -qq 2>&1 | tail -5
              sudo apt-get install -y awscli 2>&1 | tail -5
            fi

            aws --version

            # Login to ECR
            export AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID}"
            export AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY}"
            REGISTRY_DOMAIN=\$(echo "${ECR_REGISTRY}" | sed 's|https://||')
            echo "Registry: \${REGISTRY_DOMAIN}"
            aws ecr get-login-password --region us-east-1 | \\
              docker login --username AWS --password-stdin \${REGISTRY_DOMAIN}

            # Pull latest image
            echo "===== Pulling new image ====="
            docker pull \${REGISTRY_DOMAIN}/multi-agent-research:latest

            # Stop old containers
            echo "===== Stopping old app ====="
            docker compose stop app 2>&1 || echo "No app to stop"
            docker compose rm -f app 2>&1 || echo "No app to remove"

            # Start new containers
            echo "===== Starting new app ====="
            docker compose up -d app 2>&1

            # Cleanup
            docker image prune -f

            # Show status
            echo "===== Deployment complete ====="
            docker compose ps
            docker compose logs --tail=30 app
            echo "===== Deploy finished at \$(date) ====="
          DEPLOY
